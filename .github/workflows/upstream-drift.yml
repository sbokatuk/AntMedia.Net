name: upstream drift

# The pins in Directory.Build.props are updated by hand, and nothing else watches upstream: the
# iOS SDK publishes no versions at all, so without this a year of upstream fixes would go
# unnoticed. Also re-verifies the pinned libwebrtc release asset weekly — GitHub release assets
# are mutable, and a changed hash under an unchanged version is a tamper signal, not a routine
# update.

on:
  schedule:
    - cron: '17 6 * * 1' # Mondays, 06:17 UTC — off the full hour to dodge the cron rush.
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: compare pins to upstream
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Compare
        id: compare
        run: |
          . ./build/pins.sh
          drift=""
          note() { drift="${drift}- $1"$'\n'; }

          # Android: the pinned tag must still resolve to the pinned commit (the ^{} form covers
          # an annotated tag), and a newer v* tag is worth knowing about.
          tag_sha="$(git ls-remote "${ANTMEDIA_ANDROID_REPOSITORY}" "refs/tags/${ANTMEDIA_ANDROID_TAG}" | cut -f1)"
          peeled_sha="$(git ls-remote "${ANTMEDIA_ANDROID_REPOSITORY}" "refs/tags/${ANTMEDIA_ANDROID_TAG}^{}" | cut -f1)"
          effective="${peeled_sha:-${tag_sha}}"
          if [ -z "${effective}" ]; then
            note "Android tag \`${ANTMEDIA_ANDROID_TAG}\` no longer exists upstream."
          elif [ "${effective}" != "${ANTMEDIA_ANDROID_COMMIT}" ]; then
            note "**Android tag \`${ANTMEDIA_ANDROID_TAG}\` was re-pointed**: now \`${effective}\`, pinned \`${ANTMEDIA_ANDROID_COMMIT}\`. Treat as suspicious until explained."
          fi

          latest_tag="$(git ls-remote --tags "${ANTMEDIA_ANDROID_REPOSITORY}" 'refs/tags/v*' \
            | awk -F/ '$NF !~ /\^\{\}$/ { print $NF }' | sort -V | tail -1)"
          if [ -n "${latest_tag}" ] && [ "${latest_tag}" != "${ANTMEDIA_ANDROID_TAG}" ] \
            && [ "$(printf '%s\n%s\n' "${ANTMEDIA_ANDROID_TAG}" "${latest_tag}" | sort -V | tail -1)" = "${latest_tag}" ]; then
            note "Android SDK has a newer tag: \`${latest_tag}\` (pinned \`${ANTMEDIA_ANDROID_TAG}\`)."
          fi

          # iOS: no versions upstream, so the only signal is master moving past the pinned commit.
          ios_head="$(git ls-remote "${ANTMEDIA_IOS_REPOSITORY}" HEAD | cut -f1)"
          if [ -n "${ios_head}" ] && [ "${ios_head}" != "${ANTMEDIA_IOS_COMMIT}" ]; then
            note "iOS SDK master moved: \`${ios_head}\` (pinned \`${ANTMEDIA_IOS_COMMIT}\`)."
          fi

          # libwebrtc: a newer release is routine; the pinned asset's bytes changing is not.
          latest_release="$(gh api repos/stasel/WebRTC/releases/latest --jq .tag_name || true)"
          if [ -n "${latest_release}" ] && [ "${latest_release}" != "${ANTMEDIA_MAC_WEBRTC_RELEASE}" ]; then
            note "stasel/WebRTC has a newer release: \`${latest_release}\` (pinned \`${ANTMEDIA_MAC_WEBRTC_RELEASE}\`)."
          fi

          actual_sha="$(curl -sfL --retry 3 "${ANTMEDIA_MAC_WEBRTC_URL}" | shasum -a 256 | cut -d' ' -f1 || true)"
          if [ -z "${actual_sha}" ]; then
            note "Could not download \`${ANTMEDIA_MAC_WEBRTC_URL}\` to re-verify its hash."
          elif [ "${actual_sha}" != "${ANTMEDIA_MAC_WEBRTC_SHA256}" ]; then
            note "**The pinned libwebrtc asset's bytes changed**: sha256 now \`${actual_sha}\`, pinned \`${ANTMEDIA_MAC_WEBRTC_SHA256}\`. The version did not change, so treat as suspicious."
          fi

          if [ -n "${drift}" ]; then
            {
              echo 'drift<<EOF'
              printf '%s' "${drift}"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
            printf '%s' "${drift}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All pins match upstream." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open or update the drift issue
        if: steps.compare.outputs.drift != ''
        run: |
          title="Upstream drift: native SDK pins are behind or moved"
          body="$(printf 'Detected by the weekly check on %s:\n\n%s\nPins live in Directory.Build.props; docs/BUILD.md covers re-pinning.' \
            "$(date -u +%Y-%m-%d)" "${{ steps.compare.outputs.drift }}")"

          existing="$(gh issue list --state open --search "in:title \"Upstream drift\"" --json number --jq '.[0].number' || true)"
          if [ -n "${existing}" ] && [ "${existing}" != "null" ]; then
            gh issue comment "${existing}" --body "${body}"
          else
            gh issue create --title "${title}" --body "${body}"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
