name: pull request

# 'labeled' is in the list so applying the publish-beta label triggers a run that can publish;
# without it the label would only take effect on the next push.
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  version:
    name: resolve beta version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        run: |
          # Base version lives in Directory.Build.props; the PR number and run number make each
          # published prerelease unique, since nuget.org never allows a version to be reused.
          . ./build/pins.sh
          version="${ANTMEDIA_VERSION}-beta.${{ github.event.number }}.${{ github.run_number }}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Building ${version}" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build
    needs: version
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.version.outputs.version }}

  publish:
    name: publish beta to nuget.org
    needs: [version, build]
    runs-on: ubuntu-latest
    # Two gates. Forked pull requests get no OIDC token for this repository, so the exchange
    # would fail with a confusing error; those PRs still build and test. And publishing is opt-in
    # via the publish-beta label: nuget.org versions are permanent (unlist-only), so every push
    # to an open PR minting a public beta would pollute the version list for no benefit.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository
      && contains(github.event.pull_request.labels.*.name, 'publish-beta')
    # Must match the Environment on the nuget.org trusted publishing policy for this workflow.
    # Note that trusted publishing policies are per workflow file, so this job needs its own
    # policy on nuget.org pointing at pr.yml — the release.yml policy will not match it.
    environment: nuget.org
    permissions:
      contents: read
      # Lets the job request the OIDC token that nuget.org exchanges for a short-lived API key.
      # Without it the token request fails silently and the login step gets no key.
      id-token: write
    steps:
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      # Deliberately immediately before the push: the issued key is valid for one hour, and each
      # OIDC token can be exchanged exactly once.
      - name: Authenticate to nuget.org
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: |
          # Symbol packages are pushed automatically alongside each matching .nupkg.
          dotnet nuget push "artifacts/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate

      - name: Summarise
        run: |
          {
            echo "### Published \`${{ needs.version.outputs.version }}\` to nuget.org"
            echo
            for id in AntMedia.Net.Maui AntMedia.Net AntMedia.Net.Android AntMedia.Net.iOS AntMedia.Net.Mac; do
              echo "- [${id}](https://www.nuget.org/packages/${id}/${{ needs.version.outputs.version }})"
            done
          } >> "$GITHUB_STEP_SUMMARY"
