name: release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version:
    name: resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - id: resolve
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "${version}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::tag '${GITHUB_REF_NAME}' does not look like a version (expected e.g. v2.17.2)"
            exit 1
          fi

          case "${version}" in
            *-*) prerelease=true ;;
            *)   prerelease=false ;;
          esac

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${version} (prerelease=${prerelease})" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build
    needs: version
    # The native SDK pins are not derived from the tag: unlike the package version they are two
    # independent upstream repositories, so they stay in Directory.Build.props and a release binds
    # whatever the tagged commit pinned.
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.version.outputs.version }}

  publish:
    name: publish to nuget.org and create release
    needs: [version, build]
    runs-on: ubuntu-latest
    # Must match the Environment on the nuget.org trusted publishing policy for this workflow.
    # The policy carries the environment name in the OIDC claim it validates, so a mismatch fails
    # the token exchange with HTTP 401 and "Environment mismatch for policy ...".
    environment: nuget.org
    permissions:
      # contents: write creates the GitHub release; id-token: write lets the job request the OIDC
      # token that nuget.org exchanges for a short-lived API key (without it the token request
      # fails silently and the login step gets no key); attestations: write records the build
      # provenance for the packages.
      contents: write
      id-token: write
      attestations: write
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Needed to find the previous tag when generating the changelog.
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts

      # Signed provenance for exactly the bytes about to be pushed: consumers can verify with
      # `gh attestation verify <package> --repo <this repo>` that a package on nuget.org came
      # from this workflow and not from someone's laptop.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      # nuget.org is published to first: a GitHub release that links to packages which failed to
      # upload would be worse than a release that is created a moment late.
      # Deliberately immediately before the push: the issued key is valid for one hour, and each
      # OIDC token can be exchanged exactly once.
      - name: Authenticate to nuget.org
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate

      - name: Compose release notes
        run: |
          . ./build/pins.sh
          previous=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)

          # A curated docs/release-notes/<version>.md replaces the generated commit list when one
          # exists. The second lookup drops the prerelease suffix, so v2.17.2-beta.2 reuses the
          # notes written for 2.17.2 rather than silently falling back to raw commit subjects.
          # The third drops a fourth component, which belongs to this repository rather than to
          # the SDK, so 2.17.2.1 reuses the notes filed as 2.17.2.md.
          notes="docs/release-notes/${VERSION}.md"
          [ -f "${notes}" ] || notes="docs/release-notes/${VERSION%%-*}.md"
          [ -f "${notes}" ] || notes="docs/release-notes/$(printf '%s' "${VERSION%%-*}" | cut -d. -f1-3).md"

          {
            if [ -f "${notes}" ]; then
              echo "==> using curated notes from ${notes}" >&2
              cat "${notes}"
            else
              echo "## What's changed"
              echo
              if [ -n "${previous}" ]; then
                git log --no-merges --pretty='- %s (%h)' "${previous}..${GITHUB_REF_NAME}"
              else
                # No previous tag: listing every commit would reach back to the repository's
                # first commit, which is noise rather than a changelog.
                echo "Initial release."
              fi
            fi
            echo
            if [ -n "${previous}" ]; then
              echo "**Full changelog**: ${{ github.server_url }}/${{ github.repository }}/compare/${previous}...${GITHUB_REF_NAME}"
              echo
            fi

            echo "## Packages"
            echo
            echo "Bound against the Ant Media Android SDK \`${ANTMEDIA_ANDROID_TAG}\` and iOS SDK"
            echo "\`${ANTMEDIA_IOS_COMMIT}\`, the latter also built for Mac Catalyst against"
            echo "libwebrtc \`${ANTMEDIA_MAC_WEBRTC_RELEASE}\`. Targeting .NET 8, .NET 9 and .NET 10."
            echo
            echo "| Package | Platforms | NuGet |"
            echo "| --- | --- | --- |"
            echo "| \`AntMedia.Net.Maui\` | Android, iOS, Mac Catalyst | [${VERSION}](https://www.nuget.org/packages/AntMedia.Net.Maui/${VERSION}) |"
            echo "| \`AntMedia.Net\` | Android, iOS, Mac Catalyst | [${VERSION}](https://www.nuget.org/packages/AntMedia.Net/${VERSION}) |"
            echo "| \`AntMedia.Net.Android\` | Android | [${VERSION}](https://www.nuget.org/packages/AntMedia.Net.Android/${VERSION}) |"
            echo "| \`AntMedia.Net.iOS\` | iOS | [${VERSION}](https://www.nuget.org/packages/AntMedia.Net.iOS/${VERSION}) |"
            echo "| \`AntMedia.Net.Mac\` | Mac Catalyst (Apple Silicon) | [${VERSION}](https://www.nuget.org/packages/AntMedia.Net.Mac/${VERSION}) |"
            echo
            echo "\`\`\`"
            echo "dotnet add package AntMedia.Net.Maui --version ${VERSION}   # MAUI apps"
            echo "dotnet add package AntMedia.Net --version ${VERSION}        # everything else"
            echo "\`\`\`"
          } > release-notes.md

          cat release-notes.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The packages themselves are not attached: nuget.org is the distribution channel, and
          # the iOS package carries a ~26 MB xcframework per target framework. The notes link to
          # every published package instead.
          gh release create "${GITHUB_REF_NAME}" \
            --title "${VERSION}" \
            --notes-file release-notes.md \
            ${{ needs.version.outputs.prerelease == 'true' && '--prerelease' || '' }}
